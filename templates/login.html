{% extends "base.html" %}

{% block title %}ログイン - シフト管理システム{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto;">
    <h2>ログイン</h2>
    
    <form method="POST" action="{{ url_for('auth.login') }}">
        <!-- nextパラメータを保持 -->
        {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
        {% endif %}
        
        <div class="form-group">
            <label for="account">アカウント</label>
            <input type="text" id="account" name="account" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            ログイン
        </button>
    </form>
    
    <p style="margin-top: 1.5rem; text-align: center; color: #777;">
        <a href="{{ url_for('auth.public_home') }}" style="color: #667eea;">公開ホームに戻る</a>
    </p>
</div>
{% endblock %}
