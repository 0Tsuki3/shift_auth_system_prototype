{% extends "base.html" %}

{% block title %}シフト管理システム{% endblock %}

{% block content %}
<div class="card" style="text-align: center; margin-top: 3rem;">
    <h2>シフト管理システムへようこそ</h2>
    
    <p style="font-size: 1.2rem; color: #666; margin: 2rem 0;">
        スタッフのシフト管理を簡単に。
    </p>
    
    <div style="margin-top: 3rem;">
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary" style="font-size: 1.2rem; padding: 1rem 3rem;">
            ログイン
        </a>
    </div>
    
    <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #eee;">
        <h3 style="color: #667eea; margin-bottom: 1rem;">主な機能</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; text-align: left; margin-top: 1.5rem;">
            <div>
                <h4>📅 シフト管理</h4>
                <p style="color: #666;">月別カレンダー形式でシフトを管理</p>
            </div>
            <div>
                <h4>👥 スタッフ管理</h4>
                <p style="color: #666;">スタッフ情報と勤務時間を一元管理</p>
            </div>
            <div>
                <h4>💰 給料計算</h4>
                <p style="color: #666;">時給と勤務時間から自動計算</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
